<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3a;
    --accent: #ff4d6d;
    --accent2: #ffd166;
    --accent3: #06d6a0;
    --text: #f0f0f8;
    --muted: #6b6b88;
    --bar-h: 4px;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }

  /* Ambient blobs */
  body::before, body::after {
    content: '';
    position: fixed;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }
  body::before {
    width: 500px; height: 500px;
    background: var(--accent);
    top: -150px; left: -150px;
    animation: blob1 8s ease-in-out infinite alternate;
  }
  body::after {
    width: 400px; height: 400px;
    background: var(--accent3);
    bottom: -100px; right: -100px;
    animation: blob2 10s ease-in-out infinite alternate;
  }
  @keyframes blob1 { to { transform: translate(80px, 60px) scale(1.1); } }
  @keyframes blob2 { to { transform: translate(-60px, -40px) scale(1.15); } }

  .wrapper {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: 340px 320px;
    gap: 0;
    max-height: 95vh;
    border-radius: 24px;
    overflow: hidden;
    box-shadow: 0 40px 120px rgba(0,0,0,0.7), 0 0 0 1px var(--border);
    background: var(--surface);
  }

  /* ── LEFT: NOW PLAYING ── */
  .now-playing {
    background: var(--card);
    padding: 36px 32px 28px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }

  .now-playing::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse at top left, rgba(255,77,109,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .label {
    font-family: 'DM Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
    margin-bottom: 28px;
  }

  /* Vinyl disc */
  .disc-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
    position: relative;
  }
  .disc {
    width: 200px;
    height: 200px;
    border-radius: 50%;
    background: conic-gradient(
      #1c1c2e 0deg, #252535 30deg, #1c1c2e 60deg,
      #252535 90deg, #1c1c2e 120deg, #252535 150deg,
      #1c1c2e 180deg, #252535 210deg, #1c1c2e 240deg,
      #252535 270deg, #1c1c2e 300deg, #252535 330deg, #1c1c2e 360deg
    );
    box-shadow: 0 0 0 2px #2a2a3a, 0 20px 50px rgba(0,0,0,0.5);
    position: relative;
    transition: animation 0.3s;
    animation: spin 8s linear infinite;
    animation-play-state: paused;
  }
  .disc.playing { animation-play-state: running; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Grooves */
  .disc::before {
    content: '';
    position: absolute;
    inset: 18px;
    border-radius: 50%;
    background: conic-gradient(
      #141420 0deg, #1e1e2e 20deg, #141420 40deg,
      #1e1e2e 60deg, #141420 80deg, #1e1e2e 100deg,
      #141420 120deg, #1e1e2e 140deg, #141420 160deg,
      #1e1e2e 180deg, #141420 200deg, #1e1e2e 220deg,
      #141420 240deg, #1e1e2e 260deg, #141420 280deg,
      #1e1e2e 300deg, #141420 320deg, #1e1e2e 340deg, #141420 360deg
    );
    box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
  }
  /* Center hole */
  .disc::after {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 36px; height: 36px;
    border-radius: 50%;
    background: radial-gradient(circle, var(--accent) 0%, #c0392b 100%);
    box-shadow: 0 0 12px rgba(255,77,109,0.5);
    z-index: 2;
  }

  /* Track info */
  .track-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 38px;
    letter-spacing: 1px;
    line-height: 1;
    margin-bottom: 6px;
    text-transform: uppercase;
    background: linear-gradient(135deg, #fff 0%, var(--muted) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-meta {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 24px;
    font-weight: 300;
  }

  /* Progress */
  .progress-area { margin-bottom: 18px; }
  .progress-bar {
    width: 100%;
    height: var(--bar-h);
    background: var(--border);
    border-radius: 99px;
    cursor: pointer;
    position: relative;
    margin-bottom: 8px;
    overflow: visible;
  }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 99px;
    width: 0%;
    transition: width 0.1s linear;
    position: relative;
  }
  .progress-fill::after {
    content: '';
    position: absolute;
    right: -5px; top: 50%;
    transform: translateY(-50%);
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--accent2);
    opacity: 0;
    transition: opacity 0.2s;
    box-shadow: 0 0 6px rgba(255,209,102,0.6);
  }
  .progress-bar:hover .progress-fill::after { opacity: 1; }

  .time-row {
    display: flex;
    justify-content: space-between;
    font-size: 11px;
    color: var(--muted);
    font-weight: 300;
  }

  /* Volume */
  .volume-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 24px;
  }
  .vol-icon { font-size: 14px; color: var(--muted); flex-shrink: 0; }
  .volume-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 99px;
    cursor: pointer;
    position: relative;
  }
  .volume-fill {
    height: 100%;
    background: var(--accent3);
    border-radius: 99px;
    width: 80%;
  }

  /* Controls */
  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
  }
  .btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 20px;
    transition: color 0.2s, transform 0.15s;
    padding: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }
  .btn:hover { color: var(--text); transform: scale(1.15); }

  .btn-play {
    width: 54px; height: 54px;
    background: linear-gradient(135deg, var(--accent), #c0152f);
    color: white;
    font-size: 20px;
    border-radius: 50%;
    box-shadow: 0 8px 24px rgba(255,77,109,0.4);
    border: none;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: transform 0.15s, box-shadow 0.2s;
  }
  .btn-play:hover {
    transform: scale(1.08);
    box-shadow: 0 12px 32px rgba(255,77,109,0.55);
  }
  .btn-play:active { transform: scale(0.96); }

  /* ── RIGHT: PLAYLIST ── */
  .playlist-panel {
    background: var(--surface);
    display: flex;
    flex-direction: column;
    border-left: 1px solid var(--border);
  }
  .playlist-header {
    padding: 28px 24px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .playlist-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 2px;
    color: var(--text);
  }
  .track-count {
    font-size: 11px;
    color: var(--muted);
    background: var(--card);
    padding: 3px 10px;
    border-radius: 99px;
    border: 1px solid var(--border);
  }

  .playlist {
    flex: 1;
    overflow-y: auto;
    padding: 8px 0;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }
  .playlist::-webkit-scrollbar { width: 4px; }
  .playlist::-webkit-scrollbar-track { background: transparent; }
  .playlist::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

  .track-item {
    display: flex;
    align-items: center;
    padding: 11px 24px;
    cursor: pointer;
    gap: 14px;
    transition: background 0.15s;
    position: relative;
    border-left: 2px solid transparent;
  }
  .track-item:hover { background: rgba(255,255,255,0.03); }
  .track-item.active {
    background: rgba(255,77,109,0.07);
    border-left-color: var(--accent);
  }

  .track-num {
    font-size: 11px;
    color: var(--muted);
    width: 18px;
    text-align: center;
    flex-shrink: 0;
    font-weight: 300;
  }
  .track-item.active .track-num { color: var(--accent); }

  /* Mini bars animation */
  .bars {
    display: flex;
    align-items: flex-end;
    gap: 2px;
    width: 18px;
    height: 14px;
    flex-shrink: 0;
  }
  .bar-seg {
    width: 3px;
    background: var(--accent);
    border-radius: 1px;
  }
  .bar-seg:nth-child(1) { animation: bar1 0.6s ease-in-out infinite alternate; }
  .bar-seg:nth-child(2) { animation: bar2 0.5s ease-in-out infinite alternate; }
  .bar-seg:nth-child(3) { animation: bar3 0.7s ease-in-out infinite alternate; }
  @keyframes bar1 { from { height: 4px; } to { height: 12px; } }
  @keyframes bar2 { from { height: 8px; } to { height: 4px; } }
  @keyframes bar3 { from { height: 6px; } to { height: 14px; } }

  .track-info { flex: 1; min-width: 0; }
  .t-name {
    font-size: 14px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--text);
    text-transform: capitalize;
  }
  .track-item.active .t-name { color: var(--accent); }
  .t-dur {
    font-size: 11px;
    color: var(--muted);
    font-weight: 300;
    margin-top: 1px;
  }

  .t-duration {
    font-size: 11px;
    color: var(--muted);
    font-weight: 300;
    flex-shrink: 0;
  }

  /* Emoji accent per track */
  .track-emoji {
    font-size: 18px;
    flex-shrink: 0;
    width: 28px;
    text-align: center;
  }

  @media (max-width: 700px) {
    .wrapper {
      grid-template-columns: 1fr;
      grid-template-rows: auto auto;
      max-height: 100vh;
      border-radius: 0;
    }
    .playlist-panel { max-height: 50vh; }
  }
</style>
</head>
<body>

<div class="wrapper">
  <!-- NOW PLAYING -->
  <div class="now-playing">
    <div class="label">▶ Now Playing</div>

    <div class="disc-wrap">
      <div class="disc" id="disc"></div>
    </div>

    <div class="track-name" id="trackName">Águilas</div>
    <div class="track-meta" id="trackMeta">Pista 1 de 9</div>

    <div class="progress-area">
      <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="time-row">
        <span id="timeElapsed">0:00</span>
        <span id="timeDuration">0:00</span>
      </div>
    </div>

    <div class="volume-row">
      <span class="vol-icon" id="volIcon">🔊</span>
      <div class="volume-bar" id="volBar">
        <div class="volume-fill" id="volFill"></div>
      </div>
    </div>

    <div class="controls">
      <button class="btn" id="btnPrev" title="Anterior">⏮</button>
      <button class="btn-play" id="btnPlay">▶</button>
      <button class="btn" id="btnNext" title="Siguiente">⏭</button>
    </div>
  </div>

  <!-- PLAYLIST -->
  <div class="playlist-panel">
    <div class="playlist-header">
      <div class="playlist-title">Playlist</div>
      <div class="track-count" id="trackCount">9 tracks</div>
    </div>
    <div class="playlist" id="playlist"></div>
  </div>
</div>

<audio id="audio"></audio>

<script>
const tracks = [
  { file: 'aguilas.mp3',    name: 'Águilas',    emoji: '🦅' },
  { file: 'caimanes.mp3',   name: 'Caimanes',   emoji: '🐊' },
  { file: 'guacamayas.mp3', name: 'Guacamayas', emoji: '🦜' },
  { file: 'innova.mp3',     name: 'Innova',     emoji: '💡' },
  { file: 'jaguares.mp3',   name: 'Jaguares',   emoji: '🐆' },
  { file: 'lobos.mp3',      name: 'Lobos',      emoji: '🐺' },
  { file: 'quetzales.mp3',  name: 'Quetzales',  emoji: '🌿' },
  { file: 'serpientes.mp3', name: 'Serpientes', emoji: '🐍' },
  { file: 'xolos.mp3',      name: 'Xolos',      emoji: '🐕' },
];

const audio     = document.getElementById('audio');
const disc      = document.getElementById('disc');
const trackName = document.getElementById('trackName');
const trackMeta = document.getElementById('trackMeta');
const progressBar  = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const timeElapsed  = document.getElementById('timeElapsed');
const timeDuration = document.getElementById('timeDuration');
const btnPlay   = document.getElementById('btnPlay');
const btnPrev   = document.getElementById('btnPrev');
const btnNext   = document.getElementById('btnNext');
const volBar    = document.getElementById('volBar');
const volFill   = document.getElementById('volFill');
const volIcon   = document.getElementById('volIcon');
const playlist  = document.getElementById('playlist');

let currentIndex = 0;
let isPlaying = false;

function fmt(s) {
  if (isNaN(s)) return '0:00';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60).toString().padStart(2, '0');
  return `${m}:${sec}`;
}

function loadTrack(index, autoplay = false) {
  currentIndex = index;
  const t = tracks[index];
  audio.src = t.file;
  trackName.textContent = t.name;
  trackMeta.textContent = `Pista ${index + 1} de ${tracks.length}`;
  progressFill.style.width = '0%';
  timeElapsed.textContent = '0:00';
  timeDuration.textContent = '0:00';
  renderPlaylist();
  if (autoplay) { audio.play(); setPlaying(true); }
  else { setPlaying(false); }
}

function setPlaying(state) {
  isPlaying = state;
  btnPlay.textContent = state ? '⏸' : '▶';
  disc.classList.toggle('playing', state);
}

btnPlay.addEventListener('click', () => {
  if (isPlaying) { audio.pause(); setPlaying(false); }
  else { audio.play(); setPlaying(true); }
});

btnPrev.addEventListener('click', () => {
  const idx = (currentIndex - 1 + tracks.length) % tracks.length;
  loadTrack(idx, isPlaying);
});

btnNext.addEventListener('click', () => {
  const idx = (currentIndex + 1) % tracks.length;
  loadTrack(idx, isPlaying);
});

audio.addEventListener('ended', () => {
  const idx = (currentIndex + 1) % tracks.length;
  loadTrack(idx, true);
});

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime / audio.duration) * 100;
  progressFill.style.width = pct + '%';
  timeElapsed.textContent = fmt(audio.currentTime);
  timeDuration.textContent = fmt(audio.duration);
});

// Progress seek
progressBar.addEventListener('click', (e) => {
  const rect = progressBar.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  if (audio.duration) audio.currentTime = pct * audio.duration;
});

// Volume
let volume = 0.8;
audio.volume = volume;
volFill.style.width = (volume * 100) + '%';

volBar.addEventListener('click', (e) => {
  const rect = volBar.getBoundingClientRect();
  volume = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
  audio.volume = volume;
  volFill.style.width = (volume * 100) + '%';
  volIcon.textContent = volume === 0 ? '🔇' : volume < 0.4 ? '🔉' : '🔊';
});

// Render playlist
function renderPlaylist() {
  playlist.innerHTML = '';
  tracks.forEach((t, i) => {
    const item = document.createElement('div');
    item.className = 'track-item' + (i === currentIndex ? ' active' : '');
    item.innerHTML = `
      <div class="track-num">${i === currentIndex && isPlaying
        ? `<div class="bars"><div class="bar-seg"></div><div class="bar-seg"></div><div class="bar-seg"></div></div>`
        : (i + 1)}</div>
      <div class="track-emoji">${t.emoji}</div>
      <div class="track-info">
        <div class="t-name">${t.name}</div>
      </div>
    `;
    item.addEventListener('click', () => loadTrack(i, true));
    playlist.appendChild(item);
  });
  // Scroll active into view
  const active = playlist.querySelector('.active');
  if (active) active.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
}

// Init
loadTrack(0);
</script>
</body>
</html>
