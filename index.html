<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Innova Schools · Olimpiadas</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&family=Oswald:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --blue:   #0957a0;
  --blue2:  #003d8f;
  --orange: #f27c28;
  --green:  #7ab840;
  --gold:   #ffd700;
  --gold2:  #e6a800;
  --white:  #ffffff;
  --muted:  #7a8fae;
  --dark:   #0a1628;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Montserrat', sans-serif;
  background: var(--dark);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(9,87,160,0.35) 0%, transparent 70%),
    radial-gradient(ellipse 50% 35% at 80% 90%, rgba(242,124,40,0.2) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 70% 15%, rgba(122,184,64,0.15) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}
.rings-bg {
  position: fixed; bottom: -60px; right: -80px;
  opacity: 0.04; pointer-events: none; z-index: 0;
}
.app {
  position: relative; z-index: 1;
  width: min(720px, 97vw);
  border-radius: 28px; overflow: hidden;
  box-shadow: 0 0 0 1px rgba(255,255,255,0.08), 0 40px 100px rgba(0,0,0,0.7), 0 0 60px rgba(9,87,160,0.15);
}

/* HEADER */
.header {
  background: linear-gradient(135deg, var(--blue2) 0%, var(--blue) 60%, #1070c0 100%);
  padding: 18px 28px 16px;
  display: flex; align-items: center; gap: 16px;
  position: relative; overflow: hidden;
}
.header::before {
  content: ''; position: absolute; inset: 0;
  background: repeating-linear-gradient(-45deg, transparent, transparent 12px, rgba(255,255,255,0.025) 12px, rgba(255,255,255,0.025) 24px);
}
.header::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--blue) 0%, var(--gold) 33%, var(--green) 66%, var(--orange) 100%);
}
.logo-img-wrap {
  flex-shrink: 0; position: relative; z-index: 1;
  background: white;
  border-radius: 12px;
  padding: 6px 10px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  height: 52px;
  display: flex; align-items: center;
}
.logo-img-wrap img {
  height: 38px;
  width: auto;
  display: block;
}
.header-text { position: relative; z-index: 1; flex: 1; }
.school-name {
  font-family: 'Oswald', sans-serif; font-size: 20px; font-weight: 700;
  color: var(--white); letter-spacing: 1px; line-height: 1; margin-bottom: 3px;
}
.event-name { font-size: 10px; color: rgba(255,255,255,0.75); letter-spacing: 3px; text-transform: uppercase; font-weight: 600; }
.olympic-rings { position: relative; z-index: 1; display: flex; align-items: center; }
.ring {
  width: 20px; height: 20px; border-radius: 50%; border: 2.5px solid;
  position: relative; flex-shrink: 0;
}
.ring:nth-child(1) { border-color: #4fc3f7; margin-right: -6px; z-index: 5; }
.ring:nth-child(2) { border-color: var(--gold); margin-right: -6px; z-index: 4; }
.ring:nth-child(3) { border-color: #ef9a9a; margin-right: -6px; z-index: 5; }
.ring:nth-child(4) { border-color: #a5d6a7; margin-right: -6px; z-index: 4; }
.ring:nth-child(5) { border-color: rgba(255,255,255,0.4); z-index: 5; }

/* BODY */
.body {
  background: linear-gradient(180deg, #0e1e3a 0%, #0a1628 100%);
  display: grid; grid-template-columns: 1fr 1fr;
}

/* PLAYER SIDE */
.player-side {
  padding: 28px 24px 24px;
  border-right: 1px solid rgba(255,255,255,0.07);
  display: flex; flex-direction: column; gap: 20px;
}
.now-label {
  display: flex; align-items: center; gap: 7px;
  font-size: 10px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); font-weight: 700;
}
.pulse-dot {
  width: 7px; height: 7px; background: var(--gold); border-radius: 50%;
  animation: pulse 1.4s ease-in-out infinite;
}
@keyframes pulse {
  0%,100% { opacity: 1; transform: scale(1); box-shadow: 0 0 0 0 rgba(255,215,0,0.4); }
  50%      { opacity: 0.7; transform: scale(0.8); box-shadow: 0 0 0 6px rgba(255,215,0,0); }
}
.medal-wrap { display: flex; justify-content: center; }
.medal-outer {
  width: 160px; height: 160px;
  background: conic-gradient(
    var(--gold2) 0deg, var(--gold) 30deg, #fff7cc 60deg, var(--gold) 90deg,
    var(--gold2) 120deg, var(--gold) 150deg, #fff7cc 180deg, var(--gold) 210deg,
    var(--gold2) 240deg, var(--gold) 270deg, #fff7cc 300deg, var(--gold) 330deg, var(--gold2) 360deg
  );
  padding: 6px; border-radius: 50%;
  box-shadow: 0 0 0 1px rgba(255,215,0,0.3), 0 0 40px rgba(255,215,0,0.15), 0 16px 40px rgba(0,0,0,0.5);
  animation: spinMedal 10s linear infinite;
  animation-play-state: paused;
}
.medal-outer.playing { animation-play-state: running; }
@keyframes spinMedal { to { transform: rotate(360deg); } }
.medal-inner {
  width: 100%; height: 100%; border-radius: 50%;
  background: linear-gradient(135deg, #0e1e3a 0%, #0a1628 100%);
  display: flex; align-items: center; justify-content: center;
  position: relative; overflow: hidden;
}
.medal-inner::before {
  content: ''; position: absolute; inset: 0;
  background: radial-gradient(ellipse at 30% 25%, rgba(9,87,160,0.4) 0%, transparent 60%);
}
.medal-emoji {
  font-size: 52px; position: relative; z-index: 1;
}
.medal-outer.playing .medal-emoji {
  animation: counterSpin 10s linear infinite;
}
@keyframes counterSpin { to { transform: rotate(-360deg); } }
.track-info { text-align: center; }
.track-title {
  font-family: 'Oswald', sans-serif; font-size: 30px; font-weight: 700;
  color: var(--white); letter-spacing: 1px; line-height: 1; text-transform: uppercase; margin-bottom: 4px;
  background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.75) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.track-sub { font-size: 10px; color: var(--muted); letter-spacing: 1px; font-weight: 600; }
.time-row {
  display: flex; justify-content: space-between;
  font-size: 10px; color: var(--muted); font-weight: 600; margin-bottom: 6px; letter-spacing: 0.5px;
}
.prog-track {
  height: 5px; background: rgba(255,255,255,0.08); border-radius: 99px;
  cursor: pointer; position: relative; overflow: visible;
}
.prog-fill {
  height: 100%; width: 0%; border-radius: 99px;
  background: linear-gradient(90deg, var(--blue) 0%, var(--gold) 100%);
  transition: width 0.1s linear; position: relative;
}
.prog-fill::after {
  content: ''; position: absolute; right: -5px; top: 50%; transform: translateY(-50%);
  width: 11px; height: 11px; border-radius: 50%; background: var(--gold);
  box-shadow: 0 0 8px rgba(255,215,0,0.6); opacity: 0; transition: opacity 0.2s;
}
.prog-track:hover .prog-fill::after { opacity: 1; }
.vol-row { display: flex; align-items: center; gap: 10px; }
.vol-icon { font-size: 13px; color: var(--muted); flex-shrink: 0; }
.vol-track { flex: 1; height: 3px; background: rgba(255,255,255,0.08); border-radius: 99px; cursor: pointer; }
.vol-fill { height: 100%; background: var(--green); border-radius: 99px; width: 80%; }
.controls { display: flex; align-items: center; justify-content: center; gap: 10px; }
.ctrl-btn {
  background: none; border: none; cursor: pointer; color: var(--muted); font-size: 18px;
  padding: 9px; border-radius: 50%; transition: color 0.15s, background 0.15s, transform 0.15s;
  display: flex; align-items: center; justify-content: center;
}
.ctrl-btn:hover { color: var(--white); background: rgba(255,255,255,0.07); transform: scale(1.1); }
.btn-play-main {
  width: 56px; height: 56px; border-radius: 50%;
  background: linear-gradient(135deg, var(--orange) 0%, #d05f0a 100%);
  border: none; cursor: pointer; color: var(--white); font-size: 22px;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 8px 24px rgba(242,124,40,0.45); transition: transform 0.15s, box-shadow 0.2s;
}
.btn-play-main:hover { transform: scale(1.08); box-shadow: 0 12px 32px rgba(242,124,40,0.65); }
.btn-play-main:active { transform: scale(0.95); }

/* PLAYLIST */
.playlist-side { display: flex; flex-direction: column; }
.pl-header {
  padding: 20px 20px 14px; border-bottom: 1px solid rgba(255,255,255,0.07);
  display: flex; align-items: center; justify-content: space-between;
}
.pl-title {
  font-family: 'Oswald', sans-serif; font-size: 16px; font-weight: 700;
  color: var(--white); letter-spacing: 2px; text-transform: uppercase;
}
.pl-badge {
  font-size: 10px; font-weight: 700; color: var(--blue);
  background: rgba(9,87,160,0.15); border: 1px solid rgba(9,87,160,0.4);
  border-radius: 99px; padding: 3px 10px; letter-spacing: 1px;
}
.playlist {
  flex: 1; overflow-y: auto; padding: 6px 0; max-height: 400px;
  scrollbar-width: thin; scrollbar-color: rgba(255,255,255,0.1) transparent;
}
.playlist::-webkit-scrollbar { width: 3px; }
.playlist::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 99px; }
.track-row {
  display: flex; align-items: center; padding: 10px 16px; cursor: pointer;
  gap: 12px; transition: background 0.12s; border-left: 3px solid transparent;
}
.track-row:hover { background: rgba(255,255,255,0.04); }
.track-row.active { background: rgba(9,87,160,0.14); border-left-color: var(--gold); }
.tr-num { font-size: 11px; color: var(--muted); width: 16px; text-align: center; font-weight: 700; flex-shrink: 0; }
.track-row.active .tr-num { color: var(--gold); }
.eq-bars { display: flex; align-items: flex-end; gap: 1.5px; width: 16px; height: 12px; flex-shrink: 0; }
.eq-b { width: 3px; background: var(--gold); border-radius: 1px; }
.eq-b:nth-child(1) { animation: eq1 0.5s ease-in-out infinite alternate; }
.eq-b:nth-child(2) { animation: eq2 0.45s ease-in-out infinite alternate; }
.eq-b:nth-child(3) { animation: eq3 0.6s ease-in-out infinite alternate; }
@keyframes eq1 { from { height: 3px; } to { height: 11px; } }
@keyframes eq2 { from { height: 7px; } to { height: 3px; } }
@keyframes eq3 { from { height: 5px; } to { height: 12px; } }
.tr-emoji { font-size: 20px; flex-shrink: 0; width: 26px; text-align: center; }
.tr-info { flex: 1; min-width: 0; }
.tr-name {
  font-size: 13px; font-weight: 700; color: rgba(255,255,255,0.85);
  text-transform: uppercase; letter-spacing: 0.5px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.track-row.active .tr-name { color: var(--white); }

/* FOOTER */
.footer {
  background: rgba(0,0,0,0.3); border-top: 1px solid rgba(255,255,255,0.06);
  padding: 10px 28px; display: flex; align-items: center; justify-content: space-between;
}
.footer-logo { font-family: 'Oswald', sans-serif; font-size: 12px; color: rgba(255,255,255,0.3); letter-spacing: 2px; }
.footer-logo span { color: var(--orange); }
.footer-rings { display: flex; align-items: center; }
.fr { width: 12px; height: 12px; border-radius: 50%; border: 1.5px solid; position: relative; }
.fr:nth-child(1) { border-color: #4fc3f7; margin-right: -3px; z-index: 5; }
.fr:nth-child(2) { border-color: var(--gold); margin-right: -3px; z-index: 4; }
.fr:nth-child(3) { border-color: #ef9a9a; margin-right: -3px; z-index: 5; }
.fr:nth-child(4) { border-color: #a5d6a7; margin-right: -3px; z-index: 4; }
.fr:nth-child(5) { border-color: rgba(255,255,255,0.25); z-index: 5; }

@media (max-width: 640px) {
  .body { grid-template-columns: 1fr; }
  .player-side { border-right: none; border-bottom: 1px solid rgba(255,255,255,0.07); }
  .playlist { max-height: 260px; }
}
</style>
</head>

<audio id="audio"></audio>
<script>
const tracks = [
  {file:'CancionesOlimpiadasInnovaSchools/compressed/aguilas.mp3',    name:'Águilas',    emoji:'🦅'},
  {file:'CancionesOlimpiadasInnovaSchools/compressed/caimanes.mp3',   name:'Caimanes',   emoji:'🐊'},
  {file:'CancionesOlimpiadasInnovaSchools/compressed/guacamayas.mp3', name:'Guacamayas', emoji:'🦜'},
  {file:'CancionesOlimpiadasInnovaSchools/compressed/innova.mp3',     name:'Innova',     emoji:'⭐'},
  {file:'CancionesOlimpiadasInnovaSchools/compressed/jaguares.mp3',   name:'Jaguares',   emoji:'🐆'},
  {file:'CancionesOlimpiadasInnovaSchools/compressed/lobos.mp3',      name:'Lobos',      emoji:'🐺'},
  {file:'CancionesOlimpiadasInnovaSchools/compressed/quetzales.mp3',  name:'Quetzales',  emoji:'🌿'},
  {file:'CancionesOlimpiadasInnovaSchools/compressed/serpientes.mp3', name:'Serpientes', emoji:'🐍'},
  {file:'CancionesOlimpiadasInnovaSchools/compressed/xolos.mp3',      name:'Xolos',      emoji:'🐕'},
];
const audio=document.getElementById('audio'),medalOuter=document.getElementById('medalOuter'),
  medalEmoji=document.getElementById('medalEmoji'),trackTitle=document.getElementById('trackTitle'),
  trackSub=document.getElementById('trackSub'),elapsed=document.getElementById('elapsed'),
  durEl=document.getElementById('dur'),progTrack=document.getElementById('progTrack'),
  progFill=document.getElementById('progFill'),btnPlay=document.getElementById('btnPlay'),
  btnPrev=document.getElementById('btnPrev'),btnNext=document.getElementById('btnNext'),
  volTrack=document.getElementById('volTrack'),volFill=document.getElementById('volFill'),
  volIcon=document.getElementById('volIcon'),playlist=document.getElementById('playlist'),
  pulseDot=document.getElementById('pulseDot');
let cur=0, playing=false, vol=0.8;
audio.volume=vol;
const fmt=s=>(!s||isNaN(s))?'0:00':`${Math.floor(s/60)}:${String(Math.floor(s%60)).padStart(2,'0')}`;
function loadTrack(i,auto=false){
  cur=i; const t=tracks[i];
  audio.src=t.file;
  trackTitle.textContent=t.name;
  trackSub.textContent=`EQUIPO ${i+1} DE ${tracks.length} · INNOVA OLIMPIADAS`;
  medalEmoji.textContent=t.emoji;
  progFill.style.width='0%'; elapsed.textContent='0:00'; durEl.textContent='0:00';
  renderPlaylist();
  if(auto){audio.play();setPlaying(true);}else setPlaying(false);
}
function setPlaying(s){
  playing=s; btnPlay.textContent=s?'⏸':'▶';
  medalOuter.classList.toggle('playing',s);
  pulseDot.style.background=s?'var(--gold)':'var(--muted)';
  renderPlaylist();
}
btnPlay.addEventListener('click',()=>{ if(playing){audio.pause();setPlaying(false);}else{audio.play();setPlaying(true);} });
btnPrev.addEventListener('click',()=>loadTrack((cur-1+tracks.length)%tracks.length,playing));
btnNext.addEventListener('click',()=>loadTrack((cur+1)%tracks.length,playing));
audio.addEventListener('ended',()=>loadTrack((cur+1)%tracks.length,true));
audio.addEventListener('timeupdate',()=>{
  if(!audio.duration)return;
  const p=(audio.currentTime/audio.duration)*100;
  progFill.style.width=p+'%'; elapsed.textContent=fmt(audio.currentTime); durEl.textContent=fmt(audio.duration);
});
progTrack.addEventListener('click',e=>{
  const r=progTrack.getBoundingClientRect();
  if(audio.duration) audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;
});
volTrack.addEventListener('click',e=>{
  const r=volTrack.getBoundingClientRect();
  vol=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));
  audio.volume=vol; volFill.style.width=(vol*100)+'%';
  volIcon.textContent=vol===0?'🔇':vol<0.4?'🔉':'🔊';
});
function renderPlaylist(){
  playlist.innerHTML='';
  tracks.forEach((t,i)=>{
    const row=document.createElement('div');
    row.className='track-row'+(i===cur?' active':'');
    const num=(i===cur&&playing)
      ?`<div class="eq-bars"><div class="eq-b"></div><div class="eq-b"></div><div class="eq-b"></div></div>`
      :`<span class="tr-num">${i+1}</span>`;
    row.innerHTML=`${num}<div class="tr-emoji">${t.emoji}</div><div class="tr-info"><div class="tr-name">${t.name}</div></div>`;
    row.addEventListener('click',()=>loadTrack(i,true));
    playlist.appendChild(row);
  });
  playlist.querySelector('.active')?.scrollIntoView({block:'nearest',behavior:'smooth'});
}
loadTrack(0);
</script>
